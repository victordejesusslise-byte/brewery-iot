# ─────────────────────────────────────────────────────────────────
#  Mosquitto — Configuração do Broker MQTT
#  Broker recebe publicações do ESP32 (DS18B20 temperatura)
#  e entrega ao Node-RED via subscribe.
# ─────────────────────────────────────────────────────────────────

# ── Listener TCP (ESP32 + Node-RED) ──────────────────────────────
listener 1883
protocol mqtt

# ── Listener WebSocket (opcional, ferramentas web) ───────────────
listener 9001
protocol websockets

# ── Autenticação ─────────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Persistência ─────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Log ──────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true   # loga eventos de connect/disconnect (útil para debug)

# ── QoS / Limites ────────────────────────────────────────────────
# Máximo de mensagens QoS 1/2 em trânsito por cliente
max_inflight_messages 10

# Máximo de mensagens na fila quando cliente está offline
max_queued_messages 100

# Tamanho máximo do payload (bytes) — DS18B20 envia JSON pequeno
message_size_limit 512